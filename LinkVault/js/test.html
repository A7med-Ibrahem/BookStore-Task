<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMART FOLLOW UP — Doctor Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:       #08111C;
    --navy2:      #0D1B2A;
    --navy3:      #112336;
    --navy4:      #162D42;
    --teal:       #00B4D8;
    --teal2:      #0096B4;
    --teal-dim:   #00B4D820;
    --teal-glow:  #00B4D840;
    --amber:      #F59E0B;
    --amber-dim:  #F59E0B20;
    --red:        #EF4444;
    --red-dim:    #EF444420;
    --green:      #22C55E;
    --green-dim:  #22C55E20;
    --purple:     #818CF8;
    --purple-dim: #818CF820;
    --white:      #F0F6FF;
    --grey:       #64748B;
    --grey2:      #94A3B8;
    --border:     #1E3A52;
    --font-display: 'Syne', sans-serif;
    --font-body:    'DM Sans', sans-serif;
  }

  html { font-size: 16px; scroll-behavior: smooth; }

  body {
    background: var(--navy);
    color: var(--white);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
    overflow-x: hidden;
  }

  /* ── Noise overlay ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }

  /* ════════════════ SIDEBAR ════════════════ */
  .sidebar {
    width: 72px;
    background: var(--navy2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 0;
    position: fixed; left: 0; top: 0; bottom: 0;
    z-index: 100;
    gap: 8px;
  }

  .sidebar-logo {
    width: 42px; height: 42px;
    background: var(--teal);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display);
    font-weight: 800; font-size: 18px;
    color: var(--navy);
    margin-bottom: 28px;
    box-shadow: 0 0 20px var(--teal-glow);
    flex-shrink: 0;
  }

  .nav-item {
    width: 46px; height: 46px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    color: var(--grey);
    font-size: 20px;
    border: none; background: transparent;
  }
  .nav-item:hover { background: var(--navy3); color: var(--white); }
  .nav-item.active {
    background: var(--teal-dim);
    color: var(--teal);
    box-shadow: inset 0 0 0 1px var(--teal-glow);
  }
  .nav-item .badge {
    position: absolute; top: 6px; right: 6px;
    width: 8px; height: 8px;
    background: var(--red);
    border-radius: 50%;
    border: 1.5px solid var(--navy2);
  }

  .sidebar-bottom {
    margin-top: auto;
    display: flex; flex-direction: column;
    align-items: center; gap: 8px;
  }

  .avatar-sm {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--teal2), var(--purple));
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display);
    font-weight: 700; font-size: 14px;
    color: var(--white);
    cursor: pointer;
    border: 2px solid var(--border);
    transition: border-color 0.2s;
  }
  .avatar-sm:hover { border-color: var(--teal); }

  /* ════════════════ MAIN ════════════════ */
  .main {
    margin-left: 72px;
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    position: relative;
    z-index: 1;
  }

  /* ── Topbar ── */
  .topbar {
    height: 68px;
    background: var(--navy2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 32px;
    gap: 16px;
    position: sticky; top: 0; z-index: 50;
  }

  .topbar-title {
    font-family: var(--font-display);
    font-weight: 700; font-size: 18px;
    color: var(--white);
    flex: 1;
  }
  .topbar-title span { color: var(--teal); }

  .topbar-search {
    display: flex; align-items: center;
    background: var(--navy3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0 14px;
    gap: 8px;
    height: 38px;
    width: 260px;
    transition: border-color 0.2s;
  }
  .topbar-search:focus-within { border-color: var(--teal); }
  .topbar-search input {
    background: none; border: none; outline: none;
    color: var(--white); font-family: var(--font-body);
    font-size: 13.5px; width: 100%;
  }
  .topbar-search input::placeholder { color: var(--grey); }
  .topbar-search svg { color: var(--grey); flex-shrink: 0; }

  .topbar-actions { display: flex; align-items: center; gap: 10px; }

  .icon-btn {
    width: 38px; height: 38px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--navy3);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--grey2);
    transition: all 0.2s; font-size: 16px;
    position: relative;
  }
  .icon-btn:hover { border-color: var(--teal); color: var(--teal); }
  .icon-btn .dot {
    position: absolute; top: 7px; right: 7px;
    width: 7px; height: 7px;
    background: var(--red); border-radius: 50%;
    border: 1.5px solid var(--navy2);
  }

  .date-chip {
    display: flex; align-items: center; gap: 6px;
    background: var(--navy3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0 12px; height: 38px;
    font-size: 13px; color: var(--grey2);
    font-family: var(--font-body);
  }

  /* ── Content ── */
  .content {
    padding: 28px 32px 40px;
    display: flex; flex-direction: column;
    gap: 24px;
  }

  /* ── Welcome banner ── */
  .welcome {
    background: linear-gradient(135deg, var(--navy3) 0%, #0D2438 60%, #0A1E30 100%);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 32px;
    display: flex; align-items: center; justify-content: space-between;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.5s ease both;
  }

  .welcome::before {
    content: '';
    position: absolute; top: -60px; right: -60px;
    width: 280px; height: 280px;
    background: radial-gradient(circle, var(--teal-glow) 0%, transparent 70%);
    pointer-events: none;
  }
  .welcome::after {
    content: '';
    position: absolute; bottom: -40px; left: 200px;
    width: 180px; height: 180px;
    background: radial-gradient(circle, #818CF815 0%, transparent 70%);
    pointer-events: none;
  }

  .welcome-text h2 {
    font-family: var(--font-display);
    font-size: 26px; font-weight: 700;
    color: var(--white);
    margin-bottom: 6px;
  }
  .welcome-text h2 span { color: var(--teal); }
  .welcome-text p {
    color: var(--grey2); font-size: 14px; font-weight: 300;
    line-height: 1.6;
  }

  .welcome-stats {
    display: flex; gap: 2px;
    background: var(--navy);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
  .welcome-stat {
    padding: 14px 24px;
    text-align: center;
    border-right: 1px solid var(--border);
  }
  .welcome-stat:last-child { border-right: none; }
  .welcome-stat .val {
    font-family: var(--font-display);
    font-size: 28px; font-weight: 800;
    line-height: 1;
    margin-bottom: 4px;
  }
  .welcome-stat .lbl {
    font-size: 11px; color: var(--grey2);
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .val.teal   { color: var(--teal); }
  .val.amber  { color: var(--amber); }
  .val.red    { color: var(--red); }
  .val.green  { color: var(--green); }

  /* ── KPI Cards ── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }

  .kpi-card {
    background: var(--navy2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px;
    display: flex; flex-direction: column;
    gap: 14px;
    position: relative; overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    animation: fadeUp 0.5s ease both;
  }
  .kpi-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 32px #00000040;
  }
  .kpi-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 16px 16px 0 0;
  }
  .kpi-card.teal::before   { background: var(--teal); }
  .kpi-card.amber::before  { background: var(--amber); }
  .kpi-card.red::before    { background: var(--red); }
  .kpi-card.green::before  { background: var(--green); }
  .kpi-card.teal:hover   { border-color: var(--teal); box-shadow: 0 12px 32px var(--teal-dim); }
  .kpi-card.amber:hover  { border-color: var(--amber); box-shadow: 0 12px 32px var(--amber-dim); }
  .kpi-card.red:hover    { border-color: var(--red); box-shadow: 0 12px 32px var(--red-dim); }
  .kpi-card.green:hover  { border-color: var(--green); box-shadow: 0 12px 32px var(--green-dim); }

  .kpi-header {
    display: flex; align-items: center; justify-content: space-between;
  }
  .kpi-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .kpi-icon.teal   { background: var(--teal-dim); }
  .kpi-icon.amber  { background: var(--amber-dim); }
  .kpi-icon.red    { background: var(--red-dim); }
  .kpi-icon.green  { background: var(--green-dim); }

  .kpi-trend {
    display: flex; align-items: center; gap: 4px;
    font-size: 12px; font-weight: 500;
    padding: 3px 8px; border-radius: 20px;
  }
  .kpi-trend.up   { background: var(--green-dim); color: var(--green); }
  .kpi-trend.down { background: var(--red-dim);   color: var(--red); }

  .kpi-val {
    font-family: var(--font-display);
    font-size: 38px; font-weight: 800;
    line-height: 1;
  }
  .kpi-val.teal   { color: var(--teal); }
  .kpi-val.amber  { color: var(--amber); }
  .kpi-val.red    { color: var(--red); }
  .kpi-val.green  { color: var(--green); }

  .kpi-label { font-size: 13px; color: var(--grey2); margin-top: -8px; }

  .kpi-bar {
    height: 4px; background: var(--navy3);
    border-radius: 2px; overflow: hidden;
  }
  .kpi-bar-fill {
    height: 100%; border-radius: 2px;
    transition: width 1s ease;
  }
  .kpi-bar-fill.teal   { background: var(--teal); }
  .kpi-bar-fill.amber  { background: var(--amber); }
  .kpi-bar-fill.red    { background: var(--red); }
  .kpi-bar-fill.green  { background: var(--green); }

  /* ── Two-column section ── */
  .row-2 {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 20px;
  }

  /* ── Panel base ── */
  .panel {
    background: var(--navy2);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    animation: fadeUp 0.6s ease both;
  }

  .panel-header {
    padding: 18px 22px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .panel-title {
    font-family: var(--font-display);
    font-weight: 600; font-size: 15px;
    color: var(--white);
    display: flex; align-items: center; gap: 8px;
  }
  .panel-title-dot {
    width: 8px; height: 8px; border-radius: 50%;
  }

  .btn-ghost {
    background: none; border: 1px solid var(--border);
    color: var(--grey2); border-radius: 8px;
    padding: 5px 12px; font-size: 12.5px;
    cursor: pointer; font-family: var(--font-body);
    transition: all 0.2s;
  }
  .btn-ghost:hover { border-color: var(--teal); color: var(--teal); }

  /* ── Patients list ── */
  .patient-item {
    padding: 14px 22px;
    display: flex; align-items: center; gap: 14px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
  }
  .patient-item:last-child { border-bottom: none; }
  .patient-item:hover { background: var(--navy3); }

  .avatar {
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display);
    font-weight: 700; font-size: 14px;
    flex-shrink: 0;
    border: 2px solid;
  }
  .avatar.teal   { background: var(--teal-dim);   border-color: var(--teal);  color: var(--teal); }
  .avatar.amber  { background: var(--amber-dim);  border-color: var(--amber); color: var(--amber); }
  .avatar.red    { background: var(--red-dim);    border-color: var(--red);   color: var(--red); }
  .avatar.green  { background: var(--green-dim);  border-color: var(--green); color: var(--green); }
  .avatar.purple { background: var(--purple-dim); border-color: var(--purple);color: var(--purple); }

  .patient-info { flex: 1; min-width: 0; }
  .patient-name {
    font-weight: 500; font-size: 14px;
    color: var(--white); margin-bottom: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .patient-meta { font-size: 12px; color: var(--grey2); }

  .risk-badge {
    padding: 3px 10px; border-radius: 20px;
    font-size: 11.5px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.06em;
    flex-shrink: 0;
  }
  .risk-badge.stable   { background: var(--green-dim); color: var(--green); }
  .risk-badge.moderate { background: var(--amber-dim); color: var(--amber); }
  .risk-badge.critical { background: var(--red-dim);   color: var(--red);
    animation: pulse-red 2s infinite; }

  @keyframes pulse-red {
    0%, 100% { box-shadow: 0 0 0 0 var(--red-dim); }
    50%       { box-shadow: 0 0 0 4px transparent; }
  }

  .patient-time { font-size: 11px; color: var(--grey); flex-shrink: 0; margin-left: 6px; }

  /* ── Alerts panel ── */
  .alert-item {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex; gap: 12px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .alert-item:last-child { border-bottom: none; }
  .alert-item:hover { background: var(--navy3); }

  .alert-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .alert-icon.critical { background: var(--red-dim); }
  .alert-icon.warning  { background: var(--amber-dim); }
  .alert-icon.info     { background: var(--teal-dim); }

  .alert-body { flex: 1; min-width: 0; }
  .alert-title { font-size: 13px; font-weight: 500; color: var(--white); margin-bottom: 3px; }
  .alert-sub   { font-size: 12px; color: var(--grey2); }
  .alert-time  { font-size: 11px; color: var(--grey); flex-shrink: 0; padding-top: 2px; }

  .alert-dot {
    width: 7px; height: 7px; border-radius: 50%;
    margin-top: 5px; flex-shrink: 0;
  }
  .alert-dot.critical { background: var(--red); box-shadow: 0 0 6px var(--red); }
  .alert-dot.warning  { background: var(--amber); }
  .alert-dot.info     { background: var(--teal); }

  /* ── Bottom row ── */
  .row-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 320px;
    gap: 20px;
  }

  /* ── Mini chart (CSS bars) ── */
  .chart-area {
    padding: 18px 22px 10px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .chart-bars {
    display: flex; align-items: flex-end;
    gap: 8px; height: 100px;
  }
  .bar-wrap {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 4px;
  }
  .bar {
    width: 100%; border-radius: 4px 4px 0 0;
    transition: height 0.8s ease;
    position: relative;
  }
  .bar:hover::after {
    content: attr(data-val);
    position: absolute; top: -22px; left: 50%;
    transform: translateX(-50%);
    background: var(--navy);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-size: 11px; color: var(--white);
    padding: 2px 6px; white-space: nowrap;
  }
  .bar.teal  { background: linear-gradient(to top, var(--teal2), var(--teal)); }
  .bar.amber { background: linear-gradient(to top, #D97706, var(--amber)); }
  .bar-lbl { font-size: 10px; color: var(--grey); }

  /* ── Risk donut (CSS) ── */
  .donut-wrap {
    display: flex; flex-direction: column; align-items: center;
    padding: 22px;
    gap: 16px;
  }
  .donut {
    width: 120px; height: 120px;
    border-radius: 50%;
    background: conic-gradient(
      var(--green)  0deg 216deg,
      var(--amber)  216deg 280deg,
      var(--red)    280deg 360deg
    );
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .donut::before {
    content: '';
    width: 72px; height: 72px;
    background: var(--navy2);
    border-radius: 50%;
    position: absolute;
  }
  .donut-center {
    position: absolute; z-index: 1;
    text-align: center;
  }
  .donut-center .num {
    font-family: var(--font-display);
    font-weight: 800; font-size: 22px;
    color: var(--white); line-height: 1;
  }
  .donut-center .txt {
    font-size: 9px; color: var(--grey2);
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .donut-legend {
    display: flex; flex-direction: column; gap: 8px; width: 100%;
  }
  .legend-item {
    display: flex; align-items: center; gap: 8px;
    font-size: 12.5px; color: var(--grey2);
  }
  .legend-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .legend-val {
    margin-left: auto;
    font-family: var(--font-display);
    font-weight: 700; font-size: 13px;
    color: var(--white);
  }

  /* ── Recent activity ── */
  .activity-item {
    padding: 11px 22px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid #1E3A5220;
    transition: background 0.15s;
  }
  .activity-item:hover { background: var(--navy3); cursor: pointer; }
  .activity-item:last-child { border-bottom: none; }

  .act-icon {
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }
  .act-text { flex: 1; font-size: 12.5px; color: var(--grey2); line-height: 1.5; }
  .act-text strong { color: var(--white); font-weight: 500; }
  .act-time { font-size: 11px; color: var(--grey); flex-shrink: 0; }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .kpi-card:nth-child(1) { animation-delay: 0.05s; }
  .kpi-card:nth-child(2) { animation-delay: 0.10s; }
  .kpi-card:nth-child(3) { animation-delay: 0.15s; }
  .kpi-card:nth-child(4) { animation-delay: 0.20s; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--navy); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Status indicator ── */
  .live-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 0 0 var(--green);
    animation: live 2s infinite;
    flex-shrink: 0;
  }
  @keyframes live {
    0%   { box-shadow: 0 0 0 0 #22C55E60; }
    70%  { box-shadow: 0 0 0 6px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }

  .tabs {
    display: flex; gap: 2px;
    background: var(--navy);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 3px;
  }
  .tab {
    padding: 4px 12px; border-radius: 6px;
    font-size: 12px; cursor: pointer;
    color: var(--grey2); transition: all 0.2s;
    border: none; background: none;
    font-family: var(--font-body);
  }
  .tab.active {
    background: var(--navy3);
    color: var(--white);
    box-shadow: inset 0 0 0 1px var(--border);
  }
</style>
</head>
<body>

<!-- ════ SIDEBAR ════ -->
