<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkVault - Login</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: linear-gradient(135deg, var(--background-color) 0%, rgba(67, 97, 238, 0.1) 100%);
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 15px;
        }
        .brand-logo {
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="glass-card text-center fade-in">
            <i class="bi bi-box-seam brand-logo"></i>
            <h2 class="fw-bold mb-4">Welcome to LinkVault</h2>
            
            <div id="alertContainer"></div>

            <!-- Login Form -->
            <form id="loginForm" class="text-start">
                <div class="mb-3">
                    <label for="loginEmail" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="loginEmail" required placeholder="name@example.com">
                </div>
                <div class="mb-4">
                    <label for="loginPassword" class="form-label">Password</label>
                    <input type="password" class="form-control" id="loginPassword" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn btn-primary w-100 mb-3" id="loginBtn">
                    <span class="spinner-border spinner-border-sm d-none me-2" role="status" aria-hidden="true" id="loginSpinner"></span>
                    Sign In
                </button>
                <div class="text-center">
                    <span class="text-muted">Don't have an account?</span>
                    <a href="#" class="text-primary text-decoration-none fw-medium" id="showRegisterBtn">Register</a>
                </div>
            </form>

            <!-- Register Form (Hidden initially) -->
            <form id="registerForm" class="text-start d-none">
                <div class="row mb-3">
                    <div class="col">
                        <label for="regFirstName" class="form-label">First Name</label>
                        <input type="text" class="form-control" id="regFirstName" required>
                    </div>
                    <div class="col">
                        <label for="regLastName" class="form-label">Last Name</label>
                        <input type="text" class="form-control" id="regLastName" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="regEmail" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="regEmail" required placeholder="name@example.com">
                </div>
                <div class="mb-4">
                    <label for="regPassword" class="form-label">Password</label>
                    <input type="password" class="form-control" id="regPassword" required placeholder="Create a password">
                </div>
                <button type="submit" class="btn btn-primary w-100 mb-3" id="registerBtn">
                    <span class="spinner-border spinner-border-sm d-none me-2" role="status" aria-hidden="true" id="registerSpinner"></span>
                    Create Account
                </button>
                <div class="text-center">
                    <span class="text-muted">Already have an account?</span>
                    <a href="#" class="text-primary text-decoration-none fw-medium" id="showLoginBtn">Sign In</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Bootstrap JS API -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- App Scripts -->
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
